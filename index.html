<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fabric Server Downloader</title>

<style>
body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}

h1 {
    margin-bottom: 30px;
}

select, button {
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

select {
    width: 220px;
}

button {
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

#status {
    margin-top: 20px;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>
<body>

<h1>Fabric Server Downloader</h1>

<div>
    <h3>Minecraft Version</h3>
    <select id="mcVersions"></select>
</div>

<div>
    <h3>Loader Version</h3>
    <select id="loaderVersions"></select>
</div>

<br>

<button id="downloadBtn">Download Server .jar</button>

<p id="status">Loading versions...</p>

<script>
const mcSelect = document.getElementById("mcVersions");
const loaderSelect = document.getElementById("loaderVersions");
const statusText = document.getElementById("status");
const downloadBtn = document.getElementById("downloadBtn");

let installerVersion = "";

/* ===============================
   Load latest stable installer
================================ */
async function loadInstaller() {
    const response = await fetch("https://meta.fabricmc.net/v2/versions/installer");
    const data = await response.json();
    const stableInstaller = data.find(v => v.stable);
    installerVersion = stableInstaller.version;
}

/* ===============================
   Load stable Minecraft versions
================================ */
async function loadMinecraftVersions() {
    const response = await fetch("https://meta.fabricmc.net/v2/versions");
    const data = await response.json();

    mcSelect.innerHTML = "";

    data.game
        .filter(v => v.stable)
        .forEach(v => {
            const option = document.createElement("option");
            option.value = v.version;
            option.textContent = v.version;
            mcSelect.appendChild(option);
        });

    await loadLoaderVersions();
}

/* ===============================
   Load loader versions for MC
================================ */
async function loadLoaderVersions() {
    const mcVersion = mcSelect.value;

    loaderSelect.innerHTML = "";
    statusText.textContent = "Loading loader versions...";

    const response = await fetch(
        `https://meta.fabricmc.net/v2/versions/loader/${mcVersion}`
    );
    const data = await response.json();

    data
        .filter(v => v.loader.stable)
        .forEach(v => {
            const option = document.createElement("option");
            option.value = v.loader.version;
            option.textContent = v.loader.version;
            loaderSelect.appendChild(option);
        });

    statusText.textContent = "Ready to download.";
}

/* ===============================
   Download Server Jar
================================ */
function downloadServerJar() {
    const mcVersion = mcSelect.value;
    const loaderVersion = loaderSelect.value;

    if (!mcVersion || !loaderVersion || !installerVersion) {
        alert("Versions not loaded properly.");
        return;
    }

    const url =
        `https://meta.fabricmc.net/v2/versions/loader/` +
        `${mcVersion}/${loaderVersion}/${installerVersion}/server/jar`;

    console.log("Download URL:", url);
    window.open(url, "_blank");
}

/* ===============================
   Events
================================ */
mcSelect.addEventListener("change", loadLoaderVersions);
downloadBtn.addEventListener("click", downloadServerJar);

/* ===============================
   Initialize
================================ */
async function init() {
    try {
        await loadInstaller();
        await loadMinecraftVersions();
    } catch (error) {
        statusText.textContent = "Failed to load versions.";
        console.error(error);
    }
}

init();
</script>

</body>
</html>
